version: 2
updates:
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/.devcontainer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    labels: ["dependencies", "backend-dependencies-update", "dependabot"]

  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/.devcontainer"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker-dependencies-update", "dependabot"]
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    rebase-strategy: auto
    open-pull-requests-limit: 20
    labels: ["dependencies", "frontend-dependencies-update", "dependabot"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "github-actions-dependencies-update", "dependabot"]
