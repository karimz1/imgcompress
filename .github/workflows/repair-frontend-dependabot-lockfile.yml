name: Repair frontend Dependabot pnpm lockfile

# Triggered by:
#   - workflow_dispatch (maintainers manually pick a PR number)
#   - PR comment "/repair-frontend-dependabot-lockfile" by KarimZ1
#
# Security model:
#   - The actor check is in the job-level `if:`, before any checkout or token use.
#   - Only push to PRs whose head branch lives in this repo (Dependabot does;
#     forks do not). We refuse to push to fork branches.
#   - Lockfile regeneration uses `--lockfile-only --ignore-scripts` so no
#     `postinstall`/`preinstall` scripts in PR-controlled package.json execute.
#   - We do NOT use pull_request_target.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Dependabot PR number to repair"
        required: true
        type: number
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: repair-frontend-lockfile-${{ github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  repair:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login == 'KarimZ1' &&
        contains(github.event.comment.body, '/repair-frontend-dependabot-lockfile')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve and validate PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER_INPUT: ${{ inputs.pr_number || github.event.issue.number }}
        run: |
          set -euo pipefail

          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER_INPUT}")"
          author="$(jq -r '.user.login' <<< "$pr_json")"
          head_repo="$(jq -r '.head.repo.full_name' <<< "$pr_json")"
          head_ref="$(jq -r '.head.ref' <<< "$pr_json")"

          if [[ "$author" != "dependabot[bot]" ]]; then
            echo "::error::PR #${PR_NUMBER_INPUT} author is ${author}, not Dependabot. Refusing to repair."
            exit 1
          fi
          if [[ "$head_repo" != "$REPOSITORY" ]]; then
            echo "::error::PR #${PR_NUMBER_INPUT} head repo is ${head_repo}; refusing to push to a fork."
            exit 1
          fi
          if [[ ! "$head_ref" =~ ^dependabot/ ]]; then
            echo "::error::PR #${PR_NUMBER_INPUT} head ref ${head_ref} does not look like a Dependabot branch."
            exit 1
          fi

          {
            echo "number=${PR_NUMBER_INPUT}"
            echo "head_ref=${head_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Dependabot branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh branch from main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge --no-edit origin/main; then
            echo "::error::Merge from main hit conflicts; resolve manually on the PR."
            exit 1
          fi

      - name: Regenerate frontend pnpm lockfile
        env:
          PNPM_INSTALL_ARGS: "--lockfile-only --ignore-scripts"
        run: ./applyFrontendDependencyFix.sh

      - name: Push repaired branch
        run: git push origin "HEAD:${{ steps.pr.outputs.head_ref }}"

      - name: Comment outcome on PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$PR_NUMBER" ]]; then
            exit 0
          fi
          if [[ "$STATUS" == "success" ]]; then
            body="Frontend pnpm lockfile repair completed. CI will re-run on the new commit."
          else
            body="Frontend pnpm lockfile repair finished with status \`${STATUS}\`. See [run log](${RUN_URL})."
          fi
          gh pr comment --repo "$REPOSITORY" "$PR_NUMBER" --body "$body" \
            || echo "::warning::Could not comment on PR #${PR_NUMBER}."
