name: Repair frontend Dependabot lockfile

on:
  workflow_run:
    workflows: ["CI and Auto Merge for imgcompress"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Existing Dependabot PR number to repair once"
        required: true
        type: number
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: frontend-dependabot-lockfile-repair-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event_name == 'issue_comment' && github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  repair-lockfile:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          contains(github.event.comment.body, '/repair-dependabot') ||
          contains(github.event.comment.body, '/repair-frontend-deps')
        )
      ) ||
      (
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.pull_requests[0].number != null
      )
    runs-on: ubuntu-latest

    steps:
      - name: Inspect failed PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event_name == 'issue_comment' && github.event.issue.number || github.event.workflow_run.pull_requests[0].number }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
          COMMENT_AUTHOR: ${{ github.event_name == 'issue_comment' && github.event.comment.user.login || '' }}
        run: |
          set -euo pipefail

          repair_marker="<!-- imgcompress-frontend-dependabot-lockfile-repair:attempted -->"
          escalation_marker="<!-- imgcompress-frontend-dependabot-lockfile-repair:escalated -->"
          comment_author_permission="not_applicable"

          author="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.user.login')"
          head_repo="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.repo.full_name')"
          head_ref="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.ref')"
          current_head_sha="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"

          if [[ -n "$COMMENT_AUTHOR" ]]; then
            comment_author_permission="$(
              gh api "repos/${REPOSITORY}/collaborators/${COMMENT_AUTHOR}/permission" --jq '.permission' 2>/dev/null || echo "none"
            )"
          fi

          has_frontend_label="$(
            gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}" --jq \
              'any(.labels[].name; . == "frontend-dependencies-update")'
          )"
          has_dependabot_label="$(
            gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}" --jq \
              'any(.labels[].name; . == "dependabot")'
          )"
          if gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" --jq '.[].body' | grep -Fq "$repair_marker"; then
            repair_attempted="true"
          else
            repair_attempted="false"
          fi

          if gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" --jq '.[].body' | grep -Fq "$escalation_marker"; then
            already_escalated="true"
          else
            already_escalated="false"
          fi

          should_repair="false"
          should_escalate="false"
          fix_frontend_lockfile="false"
          skip_reason=""
          if [[ -n "$COMMENT_AUTHOR" && "$comment_author_permission" != "admin" && "$comment_author_permission" != "maintain" && "$comment_author_permission" != "write" ]]; then
            skip_reason="@${COMMENT_AUTHOR} has ${comment_author_permission} permission, not write/maintain/admin."
            echo "Skipping: ${skip_reason}"
          elif [[ "$author" != "dependabot[bot]" && "$author" != "dependabot-preview[bot]" ]]; then
            skip_reason="PR #${PR_NUMBER} author is ${author}, not Dependabot."
            echo "Skipping: ${skip_reason}"
          elif [[ -n "$WORKFLOW_RUN_HEAD_SHA" && "$WORKFLOW_RUN_HEAD_SHA" != "$current_head_sha" ]]; then
            skip_reason="workflow run head ${WORKFLOW_RUN_HEAD_SHA} is stale; current PR head is ${current_head_sha}."
            echo "Skipping: ${skip_reason}"
          elif [[ "$has_dependabot_label" != "true" ]]; then
            skip_reason="PR #${PR_NUMBER} does not have the dependabot label."
            echo "Skipping: ${skip_reason}"
          elif [[ "$head_repo" != "$REPOSITORY" ]]; then
            skip_reason="PR #${PR_NUMBER} head repo is ${head_repo}, not ${REPOSITORY}."
            echo "Skipping: ${skip_reason}"
          elif [[ "$repair_attempted" != "true" ]]; then
            should_repair="true"
            if [[ "$has_frontend_label" == "true" ]]; then
              fix_frontend_lockfile="true"
            fi
          elif [[ "$already_escalated" != "true" ]]; then
            should_escalate="true"
          else
            skip_reason="lockfile repair has already been tried and escalated for PR #${PR_NUMBER}."
            echo "Skipping: ${skip_reason}"
          fi

          {
            echo "should_repair=${should_repair}"
            echo "should_escalate=${should_escalate}"
            echo "number=${PR_NUMBER}"
            echo "head_ref=${head_ref}"
            echo "skip_reason=${skip_reason}"
            echo "fix_frontend_lockfile=${fix_frontend_lockfile}"
          } >> "$GITHUB_OUTPUT"

      - name: Comment when manual repair command is skipped
        if: >
          github.event_name == 'issue_comment' &&
          steps.pr.outputs.should_repair != 'true' &&
          steps.pr.outputs.should_escalate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
          SKIP_REASON: ${{ steps.pr.outputs.skip_reason }}
        run: |
          body_file="$(mktemp)"
          {
            echo "I heard the Dependabot repair command, but I skipped the repair."
            echo
            echo "Reason: ${SKIP_REASON:-the PR did not match the frontend Dependabot repair rules.}"
          } > "$body_file"
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"

      - name: Ensure repair token is configured
        if: steps.pr.outputs.should_repair == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          FRONTEND_DEPENDABOT_FIX_TOKEN: ${{ secrets.FRONTEND_DEPENDABOT_FIX_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ -z "$FRONTEND_DEPENDABOT_FIX_TOKEN" ]]; then
            body_file="$(mktemp)"
            cat > "$body_file" <<'EOF'
          I heard the Dependabot repair command, but I cannot push the repair commit yet.

          Missing secret: `FRONTEND_DEPENDABOT_FIX_TOKEN`

          Please add a fine-grained PAT or GitHub App token with `contents: write`. The default `GITHUB_TOKEN` can push, but GitHub will not start a fresh PR CI run from that push.
          EOF
            gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"
            echo "::error::Set FRONTEND_DEPENDABOT_FIX_TOKEN to a fine-grained PAT or GitHub App token with contents:write. Commits made with the default GITHUB_TOKEN do not trigger a fresh PR CI run."
            exit 1
          fi

      - name: Comment before one-shot repair
        if: steps.pr.outputs.should_repair == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
          FIX_FRONTEND_LOCKFILE: ${{ steps.pr.outputs.fix_frontend_lockfile }}
        run: |
          body_file="$(mktemp)"
          if [[ "$FIX_FRONTEND_LOCKFILE" == "true" ]]; then
            cat > "$body_file" <<'EOF'
          <!-- imgcompress-frontend-dependabot-lockfile-repair:attempted -->
          I saw this frontend Dependabot PR may have a pnpm lockfile issue, so I'll refresh this branch from `main` and try running `applyFrontendDependencyFix.sh` once, following @KarimZ1's recovery notes: https://imgcompress.karimzouine.com/docs/developers#root-cause

          This is a one-shot repair. If CI still fails after this, I'll stop and ask for help.
          EOF
          else
            cat > "$body_file" <<'EOF'
          <!-- imgcompress-frontend-dependabot-lockfile-repair:attempted -->
          I saw this Dependabot PR is failing, so I'll refresh this branch from `main` once. This is not a frontend dependency PR, so I will not run the pnpm lockfile repair.

          This is a one-shot repair. If CI still fails after this, I'll stop and ask for help.
          EOF
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"

      - name: Checkout Dependabot branch
        if: steps.pr.outputs.should_repair == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          token: ${{ secrets.FRONTEND_DEPENDABOT_FIX_TOKEN }}
          fetch-depth: 0

      - name: Set up Node
        if: steps.pr.outputs.should_repair == 'true' && steps.pr.outputs.fix_frontend_lockfile == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure repair bot identity
        if: steps.pr.outputs.should_repair == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Comment before refreshing from main
        if: steps.pr.outputs.should_repair == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
          I'm going to refresh this Dependabot branch from `main` before regenerating `frontend/pnpm-lock.yaml`, so the lockfile repair starts from the latest merged dependency state.
          EOF
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"

      - name: Refresh Dependabot branch from main
        id: refresh
        if: steps.pr.outputs.should_repair == 'true'
        run: |
          set -euo pipefail

          before="$(git rev-parse HEAD)"
          git fetch origin main
          git merge --no-edit origin/main
          after="$(git rev-parse HEAD)"

          if [[ "$before" == "$after" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment after refresh from main
        if: steps.pr.outputs.should_repair == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
          REFRESH_CHANGED: ${{ steps.refresh.outputs.changed }}
          FIX_FRONTEND_LOCKFILE: ${{ steps.pr.outputs.fix_frontend_lockfile }}
        run: |
          body_file="$(mktemp)"
          if [[ "$REFRESH_CHANGED" == "true" ]]; then
            if [[ "$FIX_FRONTEND_LOCKFILE" == "true" ]]; then
              cat > "$body_file" <<'EOF'
          Refreshed this branch from `main` successfully. I'll now regenerate `frontend/pnpm-lock.yaml` and push the repair commit if anything changed.
          EOF
            else
              cat > "$body_file" <<'EOF'
          Refreshed this branch from `main` successfully. I'll push the refresh commit now so CI can try again.
          EOF
            fi
          else
            if [[ "$FIX_FRONTEND_LOCKFILE" == "true" ]]; then
              cat > "$body_file" <<'EOF'
          This branch was already up to date with `main`. I'll still regenerate `frontend/pnpm-lock.yaml` once to check whether pnpm can repair it.
          EOF
            else
              cat > "$body_file" <<'EOF'
          This branch was already up to date with `main`, and this is not a frontend dependency PR, so there is no pnpm lockfile repair to run.
          EOF
            fi
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"

      - name: Regenerate frontend pnpm lockfile
        if: steps.pr.outputs.should_repair == 'true' && steps.pr.outputs.fix_frontend_lockfile == 'true'
        id: repair
        env:
          PNPM_INSTALL_ARGS: "--lockfile-only --ignore-scripts"
        run: |
          set -euo pipefail

          before="$(git rev-parse HEAD)"
          ./applyFrontendDependencyFix.sh
          after="$(git rev-parse HEAD)"

          if [[ "$before" == "$after" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push repaired lockfile
        if: >
          steps.pr.outputs.should_repair == 'true' &&
          (
            steps.refresh.outputs.changed == 'true' ||
            steps.repair.outputs.changed == 'true'
          )
        run: git push origin "HEAD:${{ steps.pr.outputs.head_ref }}"

      - name: Comment after pushing one-shot repair
        if: >
          steps.pr.outputs.should_repair == 'true' &&
          (
            steps.refresh.outputs.changed == 'true' ||
            steps.repair.outputs.changed == 'true'
          )
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
          REFRESH_CHANGED: ${{ steps.refresh.outputs.changed }}
          REPAIR_CHANGED: ${{ steps.repair.outputs.changed }}
        run: |
          body_file="$(mktemp)"
          repair_changed="${REPAIR_CHANGED:-false}"
          {
            echo "Pushed the one-shot Dependabot repair."
            echo
            echo "- refreshed from \`main\`: ${REFRESH_CHANGED}"
            echo "- regenerated \`frontend/pnpm-lock.yaml\`: ${repair_changed}"
            echo
            echo "CI should run again on the new commit now."
          } > "$body_file"
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"

      - name: Comment when one-shot repair made no changes
        if: >
          steps.pr.outputs.should_repair == 'true' &&
          steps.refresh.outputs.changed != 'true' &&
          steps.repair.outputs.changed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
          <!-- imgcompress-frontend-dependabot-lockfile-repair:escalated -->
          @KarimZ1 I tried the one-shot Dependabot repair, but refreshing from `main` and the frontend lockfile repair, when applicable, did not produce any changes. I'm lost now, please take a look when you can: https://imgcompress.karimzouine.com/docs/developers#root-cause
          EOF
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"

      - name: Comment after failed one-shot repair
        if: steps.pr.outputs.should_escalate == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
          <!-- imgcompress-frontend-dependabot-lockfile-repair:escalated -->
          @KarimZ1 I tried the one-shot Dependabot repair once, but CI is still failing. I'm lost now, please take a look when you can: https://imgcompress.karimzouine.com/docs/developers#root-cause
          EOF
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"

      - name: Comment when one-shot repair workflow fails
        if: failure() && steps.pr.outputs.should_repair == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
          <!-- imgcompress-frontend-dependabot-lockfile-repair:escalated -->
          @KarimZ1 I tried the one-shot frontend Dependabot repair, but the repair workflow itself failed before I could hand CI a clean retry. I'm lost now, please take a look when you can: https://imgcompress.karimzouine.com/docs/developers#root-cause
          EOF
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file"
