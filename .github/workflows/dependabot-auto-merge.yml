name: Auto Merge Dependabot PR

# Runs separately from the CI workflow so it has access to regular repo
# secrets (the chan App credentials). Dependabot-triggered workflows only
# see Dependabot-scoped secrets, but workflow_run runs in the default
# branch context with full secret access.
on:
  workflow_run:
    workflows: ["CI and Auto Merge for imgcompress"]
    types: [completed]

permissions:
  contents: read

jobs:
  auto-merge:
    # Accept runs triggered by dependabot[bot] *and* by imgcompress-chan[bot]:
    # after `/chan-fix` repairs a Dependabot PR, chan is the actor of subsequent
    # CI runs, so a dependabot-only gate would never re-fire on a repaired PR.
    # The "Resolve Dependabot PR for head SHA" step below revalidates that the
    # PR is authored by Dependabot before we merge anything.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      (
        github.event.workflow_run.actor.login == 'dependabot[bot]' ||
        github.event.workflow_run.actor.login == 'imgcompress-chan[bot]'
      ) &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint imgcompress-chan token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.IMGCOMPRESS_CHAN_APP_ID }}
          private-key: ${{ secrets.IMGCOMPRESS_CHAN_PRIVATE_KEY }}

      - name: Resolve Dependabot PR for head SHA
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          pr_json=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --search "$HEAD_SHA" \
            --json url,headRefOid,author \
            --jq "[ .[] | select(.headRefOid==\"$HEAD_SHA\") ][0]")
          if [ -z "$pr_json" ] || [ "$pr_json" = "null" ]; then
            echo "No open PR found for $HEAD_SHA"; exit 1
          fi
          author=$(echo "$pr_json" | jq -r '.author.login')
          if [ "$author" != "app/dependabot" ] && [ "$author" != "dependabot[bot]" ]; then
            echo "PR for $HEAD_SHA is not by Dependabot (author: $author); skipping"
            exit 1
          fi
          pr_url=$(echo "$pr_json" | jq -r '.url')
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Announce auto-merge on PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          body=$(cat <<'EOF'
          ### All green~! Merging now! 🎉

          Yatta~! Every check came back happy: `test-backend` (amd64 + arm64) and `test-e2e` are all green. (｡♥‿♥｡)

          Squash-merging this for you and kicking off the deploy, ne~? 💛

          Gonna take a little nap after this~ 💤
          EOF
          )
          gh pr comment --repo "$REPOSITORY" "$PR_URL" --body "$body" \
            || echo "::warning::Could not announce on $PR_URL"

      - name: Squash-merge Dependabot PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: gh pr merge --squash --delete-branch "$PR_URL"

      - name: Trigger Deployment Workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api \
            --method POST \
            "repos/${REPOSITORY}/dispatches" \
            -f event_type=deploy \
            -f "client_payload[ref]=main"

      - name: Comment if merge slipped
        if: failure() && steps.pr.outputs.url != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
          PR_URL: ${{ steps.pr.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          body=$(cat <<EOF
          ### Eep~! The merge slipped through my fingers 💔

          Uwaa... gomen, senpai. CI was all green but I couldn't finish the squash-merge on my own. (╥﹏╥)

          Could you peek at the [run log](${RUN_URL}) when you have a sec? I'll be waiting right here, ne~? 💛
          EOF
          )
          gh pr comment --repo "$REPOSITORY" "$PR_URL" --body "$body" \
            || echo "::warning::Could not comment on $PR_URL"
