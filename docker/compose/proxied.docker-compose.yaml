# This is an example of advanced Docker Compose deployment for Imgcompress
# with more settings & some best practices in common for deploying containers.

# Placing anchors for default options
# so we can reuse them in multiple Docker services
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "10"
    compress: "true"
x-healthcheck: &default-healthcheck
  interval: 3s
  retries: 10
  timeout: 3s
  start_period: 10s

# By default, Docker attachs 50 bytes header to routing network packets into container.
# Lower MTU to 1450, so 1450 + 50 from Docker = 1500 (which is the standard MTU)
networks:
  imgcompress-network:
    driver: bridge
    # This setting will cut off container from outbound and inbound(from Docker host) connections.
    # pop-the-hood, it declares for Docker to:
    # Delete Default Gateway out of container.
    # Not setup NAT (Network Address Translation) on iptables of Docker host for this network.
    # Container inside this network still can connect to each others and use service-name DNS as normal.
    internal: true
    driver_opts:
      com.docker.network.driver.mtu: 1450
  # Traefik need a dedicated network with emplicit "internal: false" to serve traffic.
  # Otherwise, staying inside "imgcompress-network" will prevent you from making request to it,
  # even if you exposed its ports in Docker Compose.
  traefik-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    stop_grace_period: 35s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    security_opt:
      - no-new-privileges:true
    command:
      - "--log.level=ERROR"
      - "--log.format=common"
      - "--ping=false"
      - "--api=true"
      - "--accesslog=true"
      - "--accesslog.format=common"
      - "--metrics.prometheus=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=imgcompress-network"
      - "--providers.docker.network=traefik-network"
      - "--entryPoints.traefik.address=:8190"
      - "--entryPoints.app.address=:80"
      - "--entryPoints.app.http.redirections.entryPoint.to=app-secure"
      - "--entryPoints.app.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.app-secure.address=:443"
      - "--entryPoints.app-secure.http3=true"
      - "--entryPoints.app-secure.transport.lifeCycle.graceTimeOut=30s"
    ports:
      - "${TRAEFIK_INTERNAL_PORT:-127.0.0.1:8190}:8190" # Traefik
      - "${TRAEFIK_HTTPS_PORT:-80}:80" # HTTP
      - "${TRAEFIK_INTERNAL_PORT:-443}:443" # HTTPS
      - "${TRAEFIK_INTERNAL_PORT:-443}:443/udp" # HTTP/3
    networks:
      - traefik-network
      - imgcompress-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging: *default-logging
    labels:
      traefik.enable: true
      traefik.http.routers.traefik.rule: Host(`${TRAEFIK_DOMAIN_NAME:-localhost}`)
      traefik.http.routers.traefik.service: api@internal
      traefik.http.routers.traefik.entryPoints: traefik
      traefik.http.routers.traefik.middlewares: traefik-auth
      traefik.http.middlewares.traefik-auth.basicauth.removeheader: true
      traefik.http.middlewares.traefik-auth.basicauth.users: "${TRAEFIK_AUTH_USERS:-user:$$2y$$05$$8zbpsdxg9wDiiKdqxiB0zeAlxZtG68P1SDBOvCN4IooLFewLx70Gm}" # user:123456

  imgcompress:
    image: ${IMGCOMPRESS_REGISTRY:-karimz1/imgcompress}:${IMGCOMPRESS_TAG:-latest}
    container_name: imgcompress
    restart: always
    # As Traefik is the reverse proxy now, so not need to expose ImgCompress anymore.
    # But keep this commented as documentary.
    # ports:
    #   - "${IMGCOMPRESS_HOST:-127.0.0.1}:${IMGCOMPRESS_PORT:-3001}:5000"
    networks:
      - imgcompress-network
    environment:
      # Set to true to remove the mascot and enable a minimal, mascot-free UI
      - DISABLE_LOGO=${IMGCOMPRESS_DISABLE_LOGO:-false}
      # Set to true to disable the storage management features (e.g., for your users to not see all the files)
      - DISABLE_STORAGE_MANAGEMENT=${IMGCOMPRESS_DISABLE_STORAGE_MANAGEMENT:-false}
    healthcheck:
      test: ["CMD", "python", "/container/healthcheck.py"]
      <<: *default-healthcheck
    # Prevent container from causing Docker host run out of file descriptors
    # (default limit of Linux is 65535)
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Allow cotainer to shut down gracefully, instead of let Docker calls SIGTERM killing it.
    stop_grace_period: 15s
    # Prevent container from gaining new privileges (container breakout)
    security_opt:
      - no-new-privileges:true
    logging:
      <<: *default-logging
    # This bunch of labels is quite overwhelming, but please, stay calm and read the comments slowly.
    # They are just instructions for Traefik to serve connection to ImgCompress.
    labels:
      traefik.enable: true
      # NOTE: you will need to buy a valid domain and point a DNS record to your instance,
      # then change TRAEFIK_DOMAIN_NAME to match your domain's name.
      # Traefik can auto-issue SSL certificate.
      traefik.http.routers.app-secure.rule: Host(`${TRAEFIK_DOMAIN_NAME:-localhost}`) || Host(`app.docker.localhost`)
      traefik.http.routers.app-secure.entryPoints: app-secure
      traefik.http.routers.app-secure.priority: 10
      traefik.http.routers.app-secure.service: app-service
      traefik.http.routers.app-secure.tls: true
      traefik.http.routers.app-secure.middlewares: security-headers

      # Because container could exposes multiple ports in the future and for sake of implicity,
      # instruct Traefik to route traffic to port 5000 of ImgCompress container.
      traefik.http.services.app-service.loadbalancer.server.port: 5000

      # TODO: Need to verify how can we healthcheck ImgCompress from outside the container
      # traefik.http.services.app-service.loadbalancer.healthCheck.path: "/up"
      # traefik.http.services.app-service.loadbalancer.healthCheck.hostname: "localhost"
      # traefik.http.services.app-service.loadbalancer.healthCheck.port: 5000
      # traefik.http.services.app-service.loadbalancer.healthCheck.interval: 2s
      # traefik.http.services.app-service.loadbalancer.healthCheck.timeout: 5s

      # This settings to protect ImgCompress out of "image bombed"
      traefik.http.middlewares.limit.buffering.maxRequestBodyBytes: 520000000 # 520mb

      # Security headers settings, very useful and common practice setup all of them.
      traefik.http.middlewares.security-headers.headers.accesscontrolmaxage: 100
      traefik.http.middlewares.security-headers.headers.addvaryheader: true # Vary: Origin
      traefik.http.middlewares.security-headers.headers.hostsproxyheaders: X-Forwarded-Host
      # Take note on HSTS: this settings will prevent browser to serve user with plan HTTPS.
      traefik.http.middlewares.security-headers.headers.stsseconds: 63072000 # Strict-Transport-Security: max-age=63072000; includeSubDomains; preload
      traefik.http.middlewares.security-headers.headers.stsincludesubdomains: true
      traefik.http.middlewares.security-headers.headers.stspreload: true
      traefik.http.middlewares.security-headers.headers.forcestsheader: true
      traefik.http.middlewares.security-headers.headers.customFrameOptionsValue: SAMEORIGIN # X-Frame-Options: same-origin
      traefik.http.middlewares.security-headers.headers.contenttypenosniff: true # X-Content-Type-Options: nosniff
      traefik.http.middlewares.security-headers.headers.browserxssfilter: true # X-XSS-Protection: 1; mode=block
      traefik.http.middlewares.security-headers.headers.referrerpolicy: strict-origin-when-cross-origin
      traefik.http.middlewares.security-headers.headers.permissionspolicy: "camera=(), geolocation=(), microphone=(), payment=(), usb=(), interest-cohort=(), gyroscope=()"
      traefik.http.middlewares.security-headers.headers.customresponseheaders.X-Robots-Tag: "noindex, nofollow"
