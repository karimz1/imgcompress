# Proxied Docker Compose deployment for ImgCompress
# This file sets up ImgCompress behind a Traefik reverse proxy with:
#   - TLS termination & automatic HTTPS redirection
#   - HTTP/3 (QUIC) support
#   - Security headers (HSTS, X-Frame-Options, CSP, etc.)
#   - Request body size limiting (anti "image bomb")
#   - Internal networking to isolate ImgCompress from direct external access
#
# Prerequisites:
#   - A valid domain name pointed to your server's IP (for TLS)
#   - Docker Engine 20.10+ with Compose V2
#
# Usage:
#   docker compose -f docker/compose/proxied.docker-compose.yaml up -d


# YAML anchors — reusable default settings shared across services.
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"    # Rotate log file when it exceeds 50 MB
    max-file: "10"     # Keep 10 rotated log files
    compress: "true"   # gzip old log files
x-healthcheck: &default-healthcheck
  interval: 3s         # Time between health-check probes
  retries: 10          # Mark "unhealthy" after 10 consecutive failures
  timeout: 3s          # Max wait time for a single probe response
  start_period: 10s    # Grace period after container start before probes count

# Docker adds a ~50-byte VXLAN/overlay header when routing packets into containers.
# We lower MTU to 1450 so that 1450 (payload) + 50 (header) = 1500 (standard Ethernet MTU),
# preventing fragmentation that can cause silent packet drops or degraded performance.
networks:
  imgcompress-network:
    driver: bridge
    # "internal: true" isolates this network by:
    #   1. Removes the default gateway — containers cannot reach the Internet.
    #   2. Skips NAT (iptables MASQUERADE) on the Docker host — no inbound/outbound routing.
    # Containers on this network can still communicate with each other
    # and resolve service names via Docker's built-in DNS.
    internal: true
    driver_opts:
      com.docker.network.driver.mtu: 1450
  # Traefik needs a dedicated external network (internal: false = default) to serve traffic.
  # If Traefik were only on the internal "imgcompress-network", incoming requests
  # from the Docker host or the Internet would never reach it even with published ports.
  traefik-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

services:
  # Traefik listens on ports 80/443 and routes requests to backend
  # services based on Docker labels, auto-discovers containers
  # via the Docker socket.
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    # Allow Traefik to drain in-flight connections before Docker kills it.
    stop_grace_period: 35s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Prevent the container process from gaining additional Linux capabilities.
    security_opt:
      - no-new-privileges:true
    command:
      # ── Logging ──
      - "--log.level=ERROR"                          # Only log errors from Traefik itself
      - "--log.format=common"                        # CLF-style log format
      - "--accesslog=true"                           # Log every incoming HTTP request
      - "--accesslog.format=common"

      # ── API / Metrics ──
      - "--ping=false"                               # Disable /ping health endpoint
      - "--api=true"                                 # Enable Traefik dashboard API
      - "--metrics.prometheus=false"                  # Disable Prometheus metrics endpoint

      # ── Docker provider ──
      - "--providers.docker=true"                         # Auto-discover containers via Docker socket
      - "--providers.docker.exposedByDefault=false"       # Only route containers with traefik.enable=true
      - "--providers.docker.network=imgcompress-network"  # Use this network to reach backend containers

      # ── Entrypoints ──
      - "--entryPoints.traefik.address=:8190"           # Traefik dashboard (internal only)
      - "--entryPoints.app.address=:80"                 # HTTP — auto-redirects to HTTPS below
      - "--entryPoints.app.http.redirections.entryPoint.to=app-secure"
      - "--entryPoints.app.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.app-secure.address=:443"         # HTTPS (TLS termination)
      - "--entryPoints.app-secure.http3=true"           # Enable HTTP/3 over QUIC (UDP :443)
      - "--entryPoints.app-secure.transport.lifeCycle.graceTimeOut=30s" # Drain timeout on shutdown
    ports:
      - "${TRAEFIK_INTERNAL_PORT:-127.0.0.1:8190}:8190"   # Dashboard — bound to localhost by default
      - "${TRAEFIK_HTTP_PORT:-80}:80"                     # HTTP  (redirects → HTTPS)
      - "${TRAEFIK_HTTPS_PORT:-443}:443"                  # HTTPS (TCP)
      - "${TRAEFIK_QUIC_PORT:-443}:443/udp"               # HTTP/3 (QUIC over UDP)
    networks:
      - traefik-network          # External-facing network (receives public traffic)
      - imgcompress-network      # Internal network (reaches ImgCompress container)
    volumes:
      # Mount Docker socket read-only so Traefik can discover containers.
      # This gives Traefik read access to the Docker API, acceptable for a
      # reverse-proxy, but be mindful in multi-tenant environments.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging: *default-logging
    labels:
      traefik.enable: true
      # ── Traefik dashboard router ──
      # Exposes Traefik's built-in API/dashboard on the "traefik" entrypoint (:8190).
      traefik.http.routers.traefik.rule: Host(`${TRAEFIK_DOMAIN_NAME:-localhost}`)
      traefik.http.routers.traefik.service: api@internal
      traefik.http.routers.traefik.entryPoints: traefik
      traefik.http.routers.traefik.middlewares: traefik-auth
      # Basic-auth protects the dashboard. The Authorization header is stripped
      # before forwarding to the upstream so credentials don't leak.
      # Default credentials: user / 123456  — CHANGE THIS in production!
      traefik.http.middlewares.traefik-auth.basicauth.removeheader: true
      traefik.http.middlewares.traefik-auth.basicauth.users: "${TRAEFIK_AUTH_USERS:-user:$$2y$$05$$8zbpsdxg9wDiiKdqxiB0zeAlxZtG68P1SDBOvCN4IooLFewLx70Gm}"

  imgcompress:
    image: ${IMGCOMPRESS_REGISTRY:-karimz1/imgcompress}:${IMGCOMPRESS_TAG:-latest}
    container_name: imgcompress
    restart: always
    # Traefik handles all inbound traffic.
    # This is commented for the sake of documentary:
    # ports:
    #   - "${IMGCOMPRESS_HOST:-127.0.0.1}:${IMGCOMPRESS_PORT:-3001}:5000"
    networks:
      - imgcompress-network
    environment:
      # Set to true to remove the mascot and enable a minimal, mascot-free UI
      - DISABLE_LOGO=${IMGCOMPRESS_DISABLE_LOGO:-false}
      # Set to true to disable the storage management features (e.g., for your users to not see all the files)
      - DISABLE_STORAGE_MANAGEMENT=${IMGCOMPRESS_DISABLE_STORAGE_MANAGEMENT:-false}
    healthcheck:
      test: ["CMD", "python", "/container/healthcheck.py"]
      <<: *default-healthcheck
    # Cap file descriptors to prevent a runaway container from exhausting
    # the Docker host's FD limit (Linux default: 65 535).
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Give the container 15s to finish in-flight requests before Docker sends SIGKILL.
    stop_grace_period: 15s
    # Prevent the process from gaining new Linux capabilities (mitigates container breakout).
    security_opt:
      - no-new-privileges:true
    logging:
      <<: *default-logging
    # ── Traefik routing labels ──
    # These labels tell Traefik how to route incoming requests to ImgCompress.
    labels:
      traefik.enable: true
      # Point your domain's DNS A/AAAA record to this server, then set
      # TRAEFIK_DOMAIN_NAME in your .env to match. Traefik will auto-issue
      # a TLS certificate via Let's Encrypt (when a certificate resolver is configured).
      traefik.http.routers.app-secure.rule: Host(`${TRAEFIK_DOMAIN_NAME:-localhost}`) || Host(`app.docker.localhost`)
      traefik.http.routers.app-secure.entryPoints: app-secure
      traefik.http.routers.app-secure.priority: 10
      traefik.http.routers.app-secure.service: app-service
      traefik.http.routers.app-secure.tls: true
      traefik.http.routers.app-secure.middlewares: security-headers

      # Explicitly tell Traefik which container port to forward traffic to.
      # Required when the image exposes (or may expose) more than one port.
      traefik.http.services.app-service.loadbalancer.server.port: 5000

      # TODO: Need to verify how we can healthcheck ImgCompress from outside the container
      # traefik.http.services.app-service.loadbalancer.healthCheck.path: "/up"
      # traefik.http.services.app-service.loadbalancer.healthCheck.hostname: "localhost"
      # traefik.http.services.app-service.loadbalancer.healthCheck.port: 5000
      # traefik.http.services.app-service.loadbalancer.healthCheck.interval: 2s
      # traefik.http.services.app-service.loadbalancer.healthCheck.timeout: 5s

      # Limit request body size to ~520 MB to mitigate "image bomb" / decompression-bomb
      # attacks where an attacker uploads a maliciously large file.
      traefik.http.middlewares.limit.buffering.maxRequestBodyBytes: 520000000

      # ── Security response headers ──
      # These headers instruct browsers to enforce strict security policies.
      #
      traefik.http.middlewares.security-headers.headers.accesscontrolmaxage: 100
      # Vary: Origin (important for caching with CORS)
      traefik.http.middlewares.security-headers.headers.addvaryheader: true
      traefik.http.middlewares.security-headers.headers.hostsproxyheaders: X-Forwarded-Host
      # HSTS: tells the browser to ALWAYS use HTTPS — once enabled, plain HTTP
      # access is blocked for the configured duration. 63 072 000 s ≈ 2 years.
      traefik.http.middlewares.security-headers.headers.stsseconds: 63072000
      traefik.http.middlewares.security-headers.headers.stsincludesubdomains: true
      traefik.http.middlewares.security-headers.headers.stspreload: true
      traefik.http.middlewares.security-headers.headers.forcestsheader: true
      traefik.http.middlewares.security-headers.headers.customFrameOptionsValue: SAMEORIGIN     # Prevent clickjacking via iframes
      traefik.http.middlewares.security-headers.headers.contenttypenosniff: true                # Block MIME-type sniffing
      traefik.http.middlewares.security-headers.headers.browserxssfilter: true                  # Legacy XSS filter (modern CSP is preferred)
      traefik.http.middlewares.security-headers.headers.referrerpolicy: strict-origin-when-cross-origin
      # Restrict browser APIs the page is allowed to use.
      traefik.http.middlewares.security-headers.headers.permissionspolicy: "camera=(), geolocation=(), microphone=(), payment=(), usb=(), interest-cohort=(), gyroscope=()"
      # Tell search-engine crawlers not to index or follow links on this site.
      traefik.http.middlewares.security-headers.headers.customresponseheaders.X-Robots-Tag: "noindex, nofollow"
