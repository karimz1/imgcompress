services:
  imgcompress:
    image: karimz1/imgcompress:latest
    container_name: imgcompress
    restart: always
    ports:
      - "3001:5000"
    # Feature flags and operational config (workers, ports, expiration, upload
    # limits, logo/storage/dev-mode toggles) live in
    # backend/image_converter/config/app.json inside the image. To override,
    # mount a customized file:
    #   volumes:
    #     - ./app.json:/container/backend/image_converter/config/app.json:ro
